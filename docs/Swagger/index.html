<!DOCTYPE html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Swagger - Projet API TAIA</title>
    <link rel="stylesheet" href="../../assets/styles.css" />
    <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui.css" />
    <style>
      body {
        margin: 0;
        background: #f5f1e8;
      }

      .swagger-shell {
        width: min(1200px, calc(100% - 32px));
        margin: 24px auto 56px;
      }

      .swagger-frame {
        padding: 24px;
        border: 1px solid rgba(20, 28, 44, 0.1);
        border-radius: 30px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: 0 22px 60px rgba(22, 32, 51, 0.14);
      }

      #swagger-ui {
        max-width: 100%;
        margin: 0 auto;
      }

      #swagger-ui .swagger-ui code,
      #swagger-ui .swagger-ui pre,
      #swagger-ui .swagger-ui .microlight,
      #swagger-ui .swagger-ui .highlight-code,
      #swagger-ui code,
      #swagger-ui pre,
      #swagger-ui .microlight,
      #swagger-ui .highlight-code {
        display: block !important;
        align-items: initial !important;
        padding: 0 !important;
        border: 0 !important;
        border-radius: 0 !important;
        background: transparent !important;
        color: inherit !important;
        font-size: 0.875rem !important;
        line-height: 1.5 !important;
        white-space: pre-wrap !important;
        word-break: break-word !important;
        overflow-wrap: anywhere !important;
      }

      #swagger-ui .swagger-ui pre,
      #swagger-ui .swagger-ui .microlight,
      #swagger-ui .swagger-ui .highlight-code,
      #swagger-ui pre,
      #swagger-ui .microlight,
      #swagger-ui .highlight-code {
        overflow-x: auto !important;
        padding: 16px 18px !important;
        border-radius: 18px !important;
        background: #101826 !important;
        color: #edf3ff !important;
        box-shadow: inset 0 0 0 1px rgba(148, 163, 184, 0.16) !important;
      }

      #swagger-ui .swagger-ui .model-box,
      #swagger-ui .swagger-ui .highlight-code,
      #swagger-ui .swagger-ui .microlight,
      #swagger-ui .model-box,
      #swagger-ui .highlight-code,
      #swagger-ui .microlight {
        max-width: 100% !important;
      }

      #swagger-ui .taia-request-schema {
        margin-top: 18px;
        padding-top: 18px;
        border-top: 1px solid rgba(20, 28, 44, 0.08);
      }

      #swagger-ui .taia-request-schema-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        margin-bottom: 10px;
      }

      #swagger-ui .taia-request-schema-header strong {
        font-size: 0.95rem;
        color: #183153;
      }

      #swagger-ui .taia-request-schema-header span {
        font-size: 0.78rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #55627a;
      }
    </style>
  </head>
  <body>
    <div class="page-bg"></div>
    <header class="site-header">
      <a href="../../" class="brand">
        <img src="../../assets/logo.svg" alt="Logo TAIA" class="brand-logo" />
        <span class="brand-copy">
          <span class="brand-kicker">Projet API TAIA</span>
          <strong>Swagger</strong>
        </span>
      </a>

      <nav class="site-nav" aria-label="Navigation principale">
        <a href="../../">Programme</a>
        <a href="../../conferences/">Conférences</a>
        <a href="../../speakers/">Speakers</a>
        <a href="../../salles/">Salles</a>
        <a href="../../entreprises/">Entreprises</a>
        <a href="../../api-space/">Espace API</a>
        <a href="../../admin/">Admin</a>
        <a href="./" class="nav-swagger is-active">Swagger</a>
      </nav>

      <div class="header-actions">
        <a href="https://github.com/CFTL-TAIA/taia-api.github.io" class="button button-dark" target="_blank" rel="noreferrer">Projet GitHub</a>
      </div>
    </header>

    <main class="swagger-shell">
      <section class="swagger-frame">
        <div id="swagger-ui"></div>
      </section>
    </main>
    <script src="https://unpkg.com/swagger-ui-dist@5.17.14/swagger-ui-bundle.js"></script>
    <script>
      function stableStringify(value) {
        if (Array.isArray(value)) {
          return `[${value.map((entry) => stableStringify(entry)).join(', ')}]`;
        }

        if (value && typeof value === 'object') {
          const entries = Object.entries(value).map(([key, child]) => `${JSON.stringify(key)}: ${stableStringify(child)}`);
          return `{${entries.join(', ')}}`;
        }

        return JSON.stringify(value);
      }

      function formatSchemaForDisplay(schema, level = 0) {
        if (!schema || typeof schema !== 'object') {
          return '';
        }

        const indent = '  '.repeat(level);
        const nextIndent = '  '.repeat(level + 1);

        if (schema.type === 'object' && schema.properties) {
          const required = new Set(schema.required || []);
          const lines = Object.entries(schema.properties).map(([key, child]) => {
            const suffix = required.has(key) ? ' // requis' : '';
            return `${nextIndent}${JSON.stringify(key)}: ${formatSchemaForDisplay(child, level + 1)}${suffix}`;
          });

          return `{
${lines.join(',\n')}
${indent}}`;
        }

        if (schema.type === 'array') {
          return `[
${nextIndent}${formatSchemaForDisplay(schema.items || {}, level + 1)}
${indent}]`;
        }

        if (schema.enum) {
          return `${schema.type || 'string'} (${schema.enum.map((entry) => JSON.stringify(entry)).join(' | ')})`;
        }

        if (schema.format) {
          return `${schema.type || 'string'} <${schema.format}>`;
        }

        if (schema.example !== undefined) {
          return `${schema.type || 'value'} = ${stableStringify(schema.example)}`;
        }

        return schema.type || 'value';
      }

      function findOperationSpec(spec, method, path) {
        return spec?.paths?.[path]?.[method.toLowerCase()] || null;
      }

      function mountRequestSchemaPanels(spec) {
        const operationBlocks = document.querySelectorAll('#swagger-ui .opblock');

        for (const block of operationBlocks) {
          const method = block.querySelector('.opblock-summary-method')?.textContent?.trim();
          const path = block.querySelector('.opblock-summary-path')?.textContent?.trim();
          const requestBodySection = block.querySelector('.opblock-section-request-body');

          if (!method || !path || !requestBodySection) {
            continue;
          }

          const operation = findOperationSpec(spec, method, path);
          const schema = operation?.requestBody?.content?.['application/json']?.schema;

          if (!schema) {
            continue;
          }

          let panel = requestBodySection.querySelector('.taia-request-schema');
          if (!panel) {
            panel = document.createElement('section');
            panel.className = 'taia-request-schema';
            requestBodySection.appendChild(panel);
          }

          panel.innerHTML = `
            <div class="taia-request-schema-header">
              <strong>Schema</strong>
              <span>request body</span>
            </div>
            <pre><code>${formatSchemaForDisplay(schema).replaceAll('&', '&amp;').replaceAll('<', '&lt;').replaceAll('>', '&gt;')}</code></pre>
          `;
        }
      }

      function createRequestSchemaScheduler(spec) {
        let scheduled = false;

        return function scheduleRequestSchemaMount() {
          if (scheduled) {
            return;
          }

          scheduled = true;
          window.requestAnimationFrame(() => {
            scheduled = false;
            mountRequestSchemaPanels(spec);
          });
        };
      }

      async function bootstrapSwagger() {
        if ('serviceWorker' in navigator) {
          const registrations = await navigator.serviceWorker.getRegistrations();

          if (registrations.length > 0) {
            await Promise.all(registrations.map((registration) => registration.unregister()));

            if (navigator.serviceWorker.controller) {
              window.location.reload();
              return;
            }
          }
        }

        const spec = await fetch('./openapi.json').then((response) => response.json());

        window.ui = SwaggerUIBundle({
          url: './openapi.json',
          dom_id: '#swagger-ui',
          deepLinking: true,
          tryItOutEnabled: true,
          displayRequestDuration: true,
          defaultModelRendering: 'example',
          defaultModelExpandDepth: 8,
          defaultModelsExpandDepth: 8,
          onComplete() {
            const container = document.getElementById('swagger-ui');
            const scheduleRequestSchemaMount = createRequestSchemaScheduler(spec);

            scheduleRequestSchemaMount();
            container.addEventListener('click', scheduleRequestSchemaMount);
            container.addEventListener('keydown', scheduleRequestSchemaMount);
          }
        });
      }

      bootstrapSwagger();
    </script>
  </body>
</html>
